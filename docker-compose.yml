services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask-app
    expose:
      - "5000"
    networks:
      - app-network
    restart: unless-stopped

  nginx-proxy:
    build:
      context: ./nginx-proxy
      dockerfile: Dockerfile
    container_name: nginx-proxy
    ports:
      - "80:80"
    depends_on:
      - flask-app
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
